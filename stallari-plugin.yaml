name: cloudflare-blade-mcp
version: "0.2.1"
description: "Manage your Cloudflare stack — DNS, Workers, Pages, R2, KV, D1, Tunnels, and cache purge. 53 tools with token-efficient output and safety gates on all writes."
author: groupthink-dev
license: MIT
tier: certified
homepage: https://github.com/groupthink-dev/cloudflare-blade-mcp
contract: edge-platform-v2

services:
  dns:
    list_zones: cf_dns_list_zones
    get_zone: cf_dns_get_zone
    list_records: cf_dns_list_records
    get_record: cf_dns_get_record
    export_records: cf_dns_export_records
    create_record: cf_dns_create_record
    update_record: cf_dns_update_record
    delete_record: cf_dns_delete_record
    bulk_create: cf_dns_bulk_create
    bulk_update: cf_dns_bulk_update
  kv:
    list_namespaces: cf_kv_list_namespaces
    list_keys: cf_kv_list_keys
    get: cf_kv_get
    put: cf_kv_put
    delete: cf_kv_delete
    bulk_put: cf_kv_bulk_put
    bulk_delete: cf_kv_bulk_delete
  d1:
    list_databases: cf_d1_list_databases
    get_database: cf_d1_get_database
    query: cf_d1_query
    execute: cf_d1_execute
    export: cf_d1_export
    list_tables: cf_d1_list_tables
    describe_table: cf_d1_describe_table
  tunnel:
    list: cf_tunnel_list
    get: cf_tunnel_get
    create: cf_tunnel_create
    delete: cf_tunnel_delete
    list_configs: cf_tunnel_list_configs
    update_config: cf_tunnel_update_config
    list_connections: cf_tunnel_list_connections
  workers:
    list_scripts: cf_workers_list_scripts
    get_script: cf_workers_get_script
    list_deployments: cf_workers_list_deployments
    create_deployment: cf_workers_create_deployment
    list_versions: cf_workers_list_versions
    list_secrets: cf_workers_list_secrets
    put_secret: cf_workers_put_secret
    delete_secret: cf_workers_delete_secret
    get_schedules: cf_workers_get_schedules
    put_schedules: cf_workers_put_schedules
  pages:
    list_projects: cf_pages_list_projects
    get_project: cf_pages_get_project
    list_deployments: cf_pages_list_deployments
    get_deployment: cf_pages_get_deployment
    rollback: cf_pages_rollback
    list_domains: cf_pages_list_domains
    purge_build_cache: cf_pages_purge_build_cache
  r2:
    list_buckets: cf_r2_list_buckets
    get_bucket: cf_r2_get_bucket
    create_bucket: cf_r2_create_bucket
    delete_bucket: cf_r2_delete_bucket
  cache:
    purge: cf_cache_purge

setup:
  icon: "☁️"
  blurb: "Manage Cloudflare DNS, KV, D1, Tunnels, Workers, Pages, R2, and Cache"
  auth_model: api_key
  complexity: moderate
  fields:
    - key: CLOUDFLARE_API_TOKEN
      label: "API Token"
      secret: true
      required: true
      placeholder: "Create at dash.cloudflare.com/profile/api-tokens"
      help: "Use a scoped API token (not global key). Needs Zone:Read, DNS:Edit at minimum."
    - key: CLOUDFLARE_ACCOUNT_ID
      label: "Account ID"
      secret: false
      required: true
      placeholder: "32-char hex from dashboard overview"
      help: "Found on the domain overview page in the Cloudflare dashboard"
  test:
    endpoint: "https://api.cloudflare.com/client/v4/user/tokens/verify"
    auth_style: bearer
    auth_header: "Authorization"
  help:
    - label: "Create API Token"
      url: "https://dash.cloudflare.com/profile/api-tokens"
    - label: "Find Account ID"
      url: "https://developers.cloudflare.com/fundamentals/setup/find-account-and-zone-ids/"

install:
  runtime: node
  package: cloudflare-blade-mcp
  command: cloudflare-blade-mcp

env:
  - name: CLOUDFLARE_API_TOKEN
    description: "Cloudflare API token with appropriate permissions"
    secret: true
  - name: CLOUDFLARE_ACCOUNT_ID
    description: "Cloudflare Account ID (required for KV, D1, Tunnel, Workers, Pages, R2 tools)"
    secret: false
  - name: MCP_API_TOKEN
    description: "Bearer token for HTTP transport authentication"
    secret: true
    default: ""
  - name: TRANSPORT
    description: "Transport mode: stdio (default) or http"
    secret: false
    default: "stdio"

requires:
  sidereal: ">=0.40"

conformance:
  required: "53/53"
  last_tested: "2026-04-11"
