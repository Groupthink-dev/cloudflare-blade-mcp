name: cloudflare-blade-mcp
version: "0.3.0"
description: "Manage your Cloudflare stack — DNS, Workers, Pages, R2, KV, D1, Tunnels, and cache purge. 53 tools with token-efficient output and safety gates on all writes."
author: groupthink-dev
license: MIT
tier: certified
homepage: https://github.com/groupthink-dev/cloudflare-blade-mcp

# DD-181 Wave 2: edge-platform-v1/v2 was retired in pack-spec 2.0.0. Cloudflare
# blade now declares the four decomposed contracts directly. D1, Tunnels, Pages,
# and Cache are not covered by a v1 contract yet — exposed as native tools.
contract:
  - dns-authoritative-v1
  - object-storage-v1
  - kv-v1
  - functions-v1

services:
  dns:
    record_list: cf_dns_list_records
    record_create: cf_dns_create_record
    record_update: cf_dns_update_record
    record_delete: cf_dns_delete_record
    record_get: cf_dns_get_record
    zone_list: cf_dns_list_zones
    zone_get: cf_dns_get_zone
    record_bulk_create: cf_dns_bulk_create
    record_bulk_update: cf_dns_bulk_update
  object_storage:
    bucket_list: cf_r2_list_buckets
    bucket_get: cf_r2_get_bucket
    bucket_create: cf_r2_create_bucket
    bucket_delete: cf_r2_delete_bucket
  kv:
    key_get: cf_kv_get
    key_put: cf_kv_put
    key_delete: cf_kv_delete
    namespace_list: cf_kv_list_namespaces
    key_list: cf_kv_list_keys
    bulk_put: cf_kv_bulk_put
    bulk_delete: cf_kv_bulk_delete
  functions:
    script_list: cf_workers_list_scripts
    script_get: cf_workers_get_script
    script_deploy: cf_workers_create_deployment
    schedule_list: cf_workers_get_schedules
    secret_list: cf_workers_list_secrets
    schedule_set: cf_workers_put_schedules
    version_list: cf_workers_list_versions
    secret_put: cf_workers_put_secret
    secret_delete: cf_workers_delete_secret

# Operations the blade does not implement. These are deliberate gaps — either
# the upstream Cloudflare API does not expose them, or they require dashboard
# operations beyond the scope of an MCP blade.
# dns-authoritative-v1: domain_check_availability, nameserver_set, zone_create, zone_delete
# object-storage-v1: object_list/get/put/delete/head/copy, presign_get/put, object_set_metadata, object_bulk_delete/put
# functions-v1: script_delete, tail, recent_logs, version_rollback, invoke
not_supported:
  - domain_check_availability
  - nameserver_set
  - zone_create
  - zone_delete
  - object_list
  - object_get
  - object_put
  - object_delete
  - object_head
  - object_copy
  - presign_get
  - presign_put
  - object_set_metadata
  - object_bulk_delete
  - object_bulk_put
  - script_delete
  - tail
  - recent_logs
  - version_rollback
  - invoke

# Native tools not covered by any v1 contract. D1, Tunnels, Pages, and Cache
# are exposed directly without a service contract.
native_tools:
  - cf_dns_export_records
  - cf_d1_list_databases
  - cf_d1_get_database
  - cf_d1_query
  - cf_d1_execute
  - cf_d1_export
  - cf_d1_list_tables
  - cf_d1_describe_table
  - cf_tunnel_list
  - cf_tunnel_get
  - cf_tunnel_create
  - cf_tunnel_delete
  - cf_tunnel_list_configs
  - cf_tunnel_update_config
  - cf_tunnel_list_connections
  - cf_workers_list_deployments
  - cf_pages_list_projects
  - cf_pages_get_project
  - cf_pages_list_deployments
  - cf_pages_get_deployment
  - cf_pages_rollback
  - cf_pages_list_domains
  - cf_pages_purge_build_cache
  - cf_cache_purge

setup:
  icon: "☁️"
  blurb: "Manage Cloudflare DNS, KV, D1, Tunnels, Workers, Pages, R2, and Cache"
  auth_model: api_key
  complexity: moderate
  fields:
    - key: CLOUDFLARE_API_TOKEN
      label: "API Token"
      secret: true
      required: true
      placeholder: "Create at dash.cloudflare.com/profile/api-tokens"
      help: "Use a scoped API token (not global key). Needs Zone:Read, DNS:Edit at minimum."
    - key: CLOUDFLARE_ACCOUNT_ID
      label: "Account ID"
      secret: false
      required: true
      placeholder: "32-char hex from dashboard overview"
      help: "Found on the domain overview page in the Cloudflare dashboard"
  test:
    endpoint: "https://api.cloudflare.com/client/v4/user/tokens/verify"
    auth_style: bearer
    auth_header: "Authorization"
  help:
    - label: "Create API Token"
      url: "https://dash.cloudflare.com/profile/api-tokens"
    - label: "Find Account ID"
      url: "https://developers.cloudflare.com/fundamentals/setup/find-account-and-zone-ids/"

install:
  runtime: node
  package: cloudflare-blade-mcp
  command: cloudflare-blade-mcp

env:
  - name: CLOUDFLARE_API_TOKEN
    description: "Cloudflare API token with appropriate permissions"
    secret: true
  - name: CLOUDFLARE_ACCOUNT_ID
    description: "Cloudflare Account ID (required for KV, D1, Tunnel, Workers, Pages, R2 tools)"
    secret: false
  - name: MCP_API_TOKEN
    description: "Bearer token for HTTP transport authentication"
    secret: true
    default: ""
  - name: TRANSPORT
    description: "Transport mode: stdio (default) or http"
    secret: false
    default: "stdio"

requires:
  stallari: ">=0.73.4"

conformance:
  dns-authoritative-v1:
    required: "4/4"
    recommended: "3/3"
    optional: "2/3"
    gated: "0/3"
    last_tested: "2026-04-28"
  object-storage-v1:
    required: "1/5"
    recommended: "1/4"
    optional: "0/3"
    gated: "2/3"
    last_tested: "2026-04-28"
  kv-v1:
    required: "3/3"
    recommended: "2/2"
    optional: "1/1"
    gated: "1/1"
    last_tested: "2026-04-28"
  functions-v1:
    required: "4/4"
    recommended: "3/4"
    optional: "1/3"
    gated: "1/3"
    last_tested: "2026-04-28"
