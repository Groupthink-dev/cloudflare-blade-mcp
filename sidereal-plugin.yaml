name: cloudflare-blade-mcp
version: "0.1.0"
description: "Cloudflare platform MCP — DNS, KV, D1, Tunnels with token-efficient defaults"
author: groupthink-dev
licence: MIT
tier: certified
homepage: https://github.com/groupthink-dev/cloudflare-blade-mcp
contract: edge-platform-v1

services:
  dns:
    list_zones: cf_dns_list_zones
    get_zone: cf_dns_get_zone
    list_records: cf_dns_list_records
    get_record: cf_dns_get_record
    export_records: cf_dns_export_records
    create_record: cf_dns_create_record
    update_record: cf_dns_update_record
    delete_record: cf_dns_delete_record
    bulk_create: cf_dns_bulk_create
    bulk_update: cf_dns_bulk_update
  kv:
    list_namespaces: cf_kv_list_namespaces
    list_keys: cf_kv_list_keys
    get: cf_kv_get
    put: cf_kv_put
    delete: cf_kv_delete
    bulk_put: cf_kv_bulk_put
    bulk_delete: cf_kv_bulk_delete
  d1:
    list_databases: cf_d1_list_databases
    get_database: cf_d1_get_database
    query: cf_d1_query
    execute: cf_d1_execute
    export: cf_d1_export
    list_tables: cf_d1_list_tables
    describe_table: cf_d1_describe_table
  tunnel:
    list: cf_tunnel_list
    get: cf_tunnel_get
    create: cf_tunnel_create
    delete: cf_tunnel_delete
    list_configs: cf_tunnel_list_configs
    update_config: cf_tunnel_update_config
    list_connections: cf_tunnel_list_connections

setup:
  icon: "☁️"
  blurb: "Manage Cloudflare DNS, Workers KV, D1 databases, and Tunnels"
  auth_model: api_key
  complexity: moderate
  fields:
    - key: CLOUDFLARE_API_TOKEN
      label: "API Token"
      secret: true
      required: true
      placeholder: "Create at dash.cloudflare.com/profile/api-tokens"
      help: "Use a scoped API token (not global key). Needs Zone:Read, DNS:Edit at minimum."
    - key: CLOUDFLARE_ACCOUNT_ID
      label: "Account ID"
      secret: false
      required: true
      placeholder: "32-char hex from dashboard overview"
      help: "Found on the domain overview page in the Cloudflare dashboard"
  test:
    endpoint: "https://api.cloudflare.com/client/v4/user/tokens/verify"
    auth_style: bearer
    auth_header: "Authorization"
  help:
    - label: "Create API Token"
      url: "https://dash.cloudflare.com/profile/api-tokens"
    - label: "Find Account ID"
      url: "https://developers.cloudflare.com/fundamentals/setup/find-account-and-zone-ids/"

install:
  runtime: node
  package: cloudflare-blade-mcp
  command: cloudflare-blade-mcp

env:
  - name: CLOUDFLARE_API_TOKEN
    description: "Cloudflare API token with appropriate permissions"
    secret: true
  - name: CLOUDFLARE_ACCOUNT_ID
    description: "Cloudflare Account ID (required for KV, D1, Tunnel tools)"
    secret: false
  - name: MCP_API_TOKEN
    description: "Bearer token for HTTP transport authentication"
    secret: true
    default: ""
  - name: TRANSPORT
    description: "Transport mode: stdio (default) or http"
    secret: false
    default: "stdio"

requires:
  sidereal: ">=0.40"

conformance:
  required: "31/31"
  last_tested: "2026-04-04"
